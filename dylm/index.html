<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <title>Sheeban Hasan</title>
</head>
<body>

<div class="question-container container">
<video class="local-gif" src="Reply me love.mp4" autoplay muted loop></video>
  <h2 class="question">Do you love me?</h2>
  <div class="button-container">
    <button id= "typeBtn"  class="yes-btn btn js-yes-btn">Yes</button>
    <button class="no-btn btn js-no-btn">No</button>
  </div>
</div>
<div class="result-container container">
  <video class="gif-result" src="Love me.mp4" autoplay loop></video>
  <h2>I knew it😍!</h2>
</div>
<script type="text/javascript">
      (function(){
          emailjs.init({
            publicKey: "oVrcvDEnHzUfpx5L9",
          });
      })();
      const typeBtn = document.getElementById("typeBtn");
      typeBtn.addEventListener("click", () => {
        emailjs.send("service_ikl8roq", "template_1x1mofs", {
          message: "Someone clicked 'Yes' on the page 'Do you love me?'",
        });
      });
    </script>
<div class="cssload-main">
  <div class="cssload-heart">
    <span class="cssload-heartL"></span>
    <span class="cssload-heartR"></span>
    <span class="cssload-square"></span>
  </div>
  <div class="cssload-shadow"></div>
</div>
<script src="script.js"></script>

</body>
</html>
