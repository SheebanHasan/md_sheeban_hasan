<script>

const fhContainer = document.getElementById('fh-container');
const heartEmojis = ['❤️','💕','💖','💗','💓','💝','🌸','✨'];
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'fh';
  h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  h.style.left = Math.random() * 100 + '%';
  h.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
  h.style.animationDuration = (Math.random() * 8 + 7) + 's';
  h.style.animationDelay = (Math.random() * 3) + 's';
  fhContainer.appendChild(h);
  setTimeout(() => h.remove(), 16000);
}
setInterval(spawnHeart, 600);
for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i * 200);


const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * pCanvas.width;
    this.y = Math.random() * pCanvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = -Math.random() * 0.5 - 0.2;
    this.opacity = Math.random() * 0.6 + 0.1;
    this.color = `hsl(${Math.random() * 60 + 310}, 80%, 75%)`;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.y < -10) this.reset();
  }
  draw() {
    pCtx.beginPath();
    pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    pCtx.fillStyle = this.color;
    pCtx.globalAlpha = this.opacity;
    pCtx.fill();
    pCtx.globalAlpha = 1;
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

function animateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();


const revealEls = document.querySelectorAll('.reveal');
const revealObs = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });
}, { threshold: 0.12 });
revealEls.forEach(el => revealObs.observe(el));


const wishItems = document.querySelectorAll('.wish-item');
const wishObs = new IntersectionObserver((entries) => {
  entries.forEach((e, i) => {
    if (e.isIntersecting) {
      wishItems.forEach((w, idx) => {
        setTimeout(() => w.classList.add('visible'), idx * 200);
      });
      wishObs.disconnect();
    }
  });
}, { threshold: 0.1 });
if (wishItems[0]) wishObs.observe(wishItems[0]);

const cCanvas = document.getElementById('confetti-canvas');
const cCtx = cCanvas.getContext('2d');
cCanvas.width = window.innerWidth;
cCanvas.height = window.innerHeight;
window.addEventListener('resize', () => { cCanvas.width = window.innerWidth; cCanvas.height = window.innerHeight; });

let confettiPieces = [];
function launchConfetti() {
  for (let i = 0; i < 180; i++) {
    confettiPieces.push({
      x: Math.random() * cCanvas.width,
      y: -10,
      size: Math.random() * 10 + 5,
      color: ['#e8437a','#f7a8c4','#9c27b0','#ce93d8','#f9c74f','#fff'][Math.floor(Math.random()*6)],
      speedX: (Math.random()-0.5)*6,
      speedY: Math.random()*5+3,
      rot: Math.random()*360,
      rotSpeed: (Math.random()-0.5)*10,
      shape: Math.random() > 0.5 ? 'rect' : 'heart',
      life: 1
    });
  }
  animateConfetti();
  setTimeout(() => { confettiPieces = []; cCtx.clearRect(0,0,cCanvas.width,cCanvas.height); }, 4000);
}

function animateConfetti() {
  if (confettiPieces.length === 0) return;
  cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);
  confettiPieces.forEach(p => {
    p.x += p.speedX; p.y += p.speedY; p.rot += p.rotSpeed; p.life -= 0.006;
    cCtx.save();
    cCtx.translate(p.x, p.y);
    cCtx.rotate(p.rot * Math.PI/180);
    cCtx.globalAlpha = Math.max(p.life, 0);
    cCtx.fillStyle = p.color;
    if (p.shape === 'rect') {
      cCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
    } else {
      drawHeartShape(cCtx, 0, 0, p.size*0.6);
    }
    cCtx.restore();
  });
  confettiPieces = confettiPieces.filter(p => p.y < cCanvas.height + 20 && p.life > 0);
  if (confettiPieces.length > 0) requestAnimationFrame(animateConfetti);
}

function drawHeartShape(ctx, x, y, size) {
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(x, y, x - size, y, x - size, y + size * 0.3);
  ctx.bezierCurveTo(x - size, y + size * 0.65, x, y + size * 0.9, x, y + size);
  ctx.bezierCurveTo(x, y + size * 0.9, x + size, y + size * 0.65, x + size, y + size * 0.3);
  ctx.bezierCurveTo(x + size, y, x, y, x, y + size * 0.3);
  ctx.fill();
}

function launchHeartExplosion() {
  const emojis = ['❤️','💕','💖','💗','💝','🌸','✨','💫'];
  for (let i = 0; i < 20; i++) {

      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }, i * 80);
  }
}
